name: Publish to npm

on:
  workflow_dispatch:
    inputs:
      version_type:
        description: 'Version bump type'
        required: true
        default: 'patch'
        type: choice
        options:
          - patch
          - minor
          - major
      dry_run:
        description: 'Dry run (skip actual publish)'
        required: false
        default: false
        type: boolean
      tag:
        description: 'npm tag (latest, beta, next)'
        required: false
        default: 'latest'
        type: choice
        options:
          - latest
          - beta
          - next

env:
  NODE_VERSION: '24'

jobs:
  publish:
    name: Publish to npm
    runs-on: ubuntu-latest
    permissions:
      contents: write
      id-token: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          registry-url: 'https://registry.npmjs.org'
          cache: 'npm'

      - name: Configure Git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Install dependencies
        run: npm ci

      - name: Lint check
        run: npm run lint || true

      - name: Type check
        run: npm run type-check || true

      - name: Get current version
        id: current_version
        run: |
          CURRENT_VERSION=$(node -p "require('./package.json').version")
          echo "version=$CURRENT_VERSION" >> $GITHUB_OUTPUT
          echo "Current version: $CURRENT_VERSION"

      - name: Bump version
        id: bump_version
        run: |
          # Bump version without creating git tag (we'll do it manually)
          npm version ${{ github.event.inputs.version_type }} --no-git-tag-version
          
          NEW_VERSION=$(node -p "require('./package.json').version")
          echo "version=$NEW_VERSION" >> $GITHUB_OUTPUT
          echo "New version: $NEW_VERSION"

      - name: Update CHANGELOG
        run: |
          NEW_VERSION=${{ steps.bump_version.outputs.version }}
          DATE=$(date +%Y-%m-%d)
          
          # Create or update CHANGELOG.md
          if [ -f CHANGELOG.md ]; then
            # Insert new version entry after the header
            sed -i "s/# Changelog/# Changelog\n\n## [$NEW_VERSION] - $DATE\n\n- Version bump (${{ github.event.inputs.version_type }})\n/" CHANGELOG.md
          else
            cat > CHANGELOG.md << EOF
          # Changelog

          All notable changes to this project will be documented in this file.

          ## [$NEW_VERSION] - $DATE

          - Initial release
          - AI Judge system with Ollama and 9Router support
          - Multi-worker authentication
          - Page Object Model structure
          - Full CI/CD pipeline
          EOF
          fi

      - name: Commit version bump
        if: ${{ github.event.inputs.dry_run == 'false' }}
        run: |
          git add package.json package-lock.json CHANGELOG.md
          git commit -m "chore(release): v${{ steps.bump_version.outputs.version }}"
          git tag "v${{ steps.bump_version.outputs.version }}"

      - name: Push changes
        if: ${{ github.event.inputs.dry_run == 'false' }}
        run: |
          # Push the version-bump commit back to the branch the workflow was
          # dispatched from (github.ref_name), not a hardcoded "main".
          git push origin "HEAD:${{ github.ref_name }}"
          git push origin "v${{ steps.bump_version.outputs.version }}"

      - name: Publish to npm (Dry Run)
        if: ${{ github.event.inputs.dry_run == 'true' }}
        run: |
          echo "🔍 Dry run - would publish:"
          npm pack --dry-run
          echo ""
          echo "📦 Package contents:"
          npm pack --dry-run 2>&1 | grep -E "^npm notice" || true

      - name: Publish to npm
        if: ${{ github.event.inputs.dry_run == 'false' }}
        run: |
          npm publish --tag ${{ github.event.inputs.tag }} --provenance --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Create GitHub Release
        if: ${{ github.event.inputs.dry_run == 'false' }}
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ steps.bump_version.outputs.version }}
          name: v${{ steps.bump_version.outputs.version }}
          body: |
            ## 🎭 Playwright AI Distro v${{ steps.bump_version.outputs.version }}

            ### Installation

            ```bash
            npm init @caslanqa/playwright-ai@latest my-project
            cd my-project
            npm test
            ```

            ### Changes

            - Version bump: ${{ steps.current_version.outputs.version }} → ${{ steps.bump_version.outputs.version }}
            - Type: ${{ github.event.inputs.version_type }}

            ### Links

            - [npm package](https://www.npmjs.com/package/@caslanqa/create-playwright-ai)
            - [Documentation](https://github.com/${{ github.repository }}#readme)
          draft: false
          prerelease: ${{ github.event.inputs.tag != 'latest' }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Summary
        run: |
          echo "## 📦 Publish Summary" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          if [ "${{ github.event.inputs.dry_run }}" == "true" ]; then
            echo "🔍 **Dry Run** - No actual publish performed" >> $GITHUB_STEP_SUMMARY
          else
            echo "✅ **Published successfully!**" >> $GITHUB_STEP_SUMMARY
          fi
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Property | Value |" >> $GITHUB_STEP_SUMMARY
          echo "|----------|-------|" >> $GITHUB_STEP_SUMMARY
          echo "| Package | \`@caslanqa/create-playwright-ai\` |" >> $GITHUB_STEP_SUMMARY
          echo "| Previous | \`${{ steps.current_version.outputs.version }}\` |" >> $GITHUB_STEP_SUMMARY
          echo "| New | \`${{ steps.bump_version.outputs.version }}\` |" >> $GITHUB_STEP_SUMMARY
          echo "| Bump Type | \`${{ github.event.inputs.version_type }}\` |" >> $GITHUB_STEP_SUMMARY
          echo "| Tag | \`${{ github.event.inputs.tag }}\` |" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          if [ "${{ github.event.inputs.dry_run }}" == "false" ]; then
            echo "### Install" >> $GITHUB_STEP_SUMMARY
            echo "\`\`\`bash" >> $GITHUB_STEP_SUMMARY
            echo "npm init @caslanqa/playwright-ai@${{ steps.bump_version.outputs.version }} my-project" >> $GITHUB_STEP_SUMMARY
            echo "\`\`\`" >> $GITHUB_STEP_SUMMARY
          fi
