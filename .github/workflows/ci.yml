name: Playwright Tests with AI Judge

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]
  workflow_dispatch:
    inputs:
      environment:
        description: 'Test environment'
        required: true
        default: 'dev'
        type: choice
        options:
          - dev
          - staging
          - production
      judge_model:
        description: 'AI Judge model to pin (optional; leave empty for automatic routing)'
        required: false
        default: ''
        type: string
      browser:
        description: 'Browser to test'
        required: true
        default: 'chromium'
        type: choice
        options:
          - chromium
          - firefox
          - webkit
          - all

env:
  TEST_ENV: ${{ github.event.inputs.environment || 'dev' }}
  # Optional: pin a judge model globally. Empty enables automatic routing (config/aiJudge.config.ts).
  JUDGE_MODEL: ${{ github.event.inputs.judge_model || '' }}

jobs:
  test:
    timeout-minutes: 60
    runs-on: ubuntu-latest
    
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright Browsers
        run: npx playwright install --with-deps

      # ── AI Judge backend (PLACEHOLDER — customize for your setup) ────────────────
      # The AI Judge needs a model backend; this scaffold does NOT assume one. Pick ONE:
      #
      #   • Local (Ollama) — install, serve, and pull a model, e.g.:
      #       - name: Setup Ollama
      #         run: |
      #           curl -fsSL https://ollama.com/install.sh | sh
      #           ollama serve &
      #           until curl -s http://localhost:11434/api/tags >/dev/null; do sleep 1; done
      #           ollama pull qwen3.5        # ← your model(s)
      #
      #   • Cloud gateway (9Router / OpenAI-compatible) — set JUDGE_GATEWAY_BASE_URL and JUDGE_API_KEY
      #     in the `env:` block above (use repository secrets) and skip Ollama entirely.
      #
      # Until a backend is wired here, AI-judge tests will fail in CI.

      - name: Copy environment config
        run: |
          cp env/environments.example.json env/environments.json
          cp testData/users.example.json testData/users.json

      - name: Run Playwright tests
        run: |
          if [ "${{ github.event.inputs.browser }}" = "all" ]; then
            npx playwright test
          else
            npx playwright test --project=${{ github.event.inputs.browser || 'chromium' }}
          fi

      - name: Upload Playwright Report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 3

      - name: Upload Allure Results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: allure-results
          path: allure-results/
          retention-days: 3

      - name: Upload Test Results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: test-results
          path: test-results/
          retention-days: 33
