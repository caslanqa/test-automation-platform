name: Release

on:
  workflow_dispatch:

concurrency:
  group: release
  cancel-in-progress: false

permissions:
  contents: write

jobs:
  release:
    if: github.repository == 'caslanqa/test-automation-platform'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
          registry-url: 'https://registry.npmjs.org'

      - run: npm ci

      - name: Build all packages
        run: npm run build

      - name: Version, commit, and publish
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
          HUSKY: '0'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          # Apply pending changesets: bump versions, write changelogs, delete the changeset files.
          npx changeset version
          npm install --package-lock-only --ignore-scripts

          # Commit + push the bump to main FIRST (so a later publish failure is recoverable on re-run).
          # Skipped when there was nothing to version (publish-only runs).
          if git diff --quiet && git diff --cached --quiet; then
            echo "No version changes to commit — publish-only run."
          else
            git add -A
            git commit -m "chore(release): version packages [skip ci]"
            git push origin HEAD:main
          fi

          # Publish every package whose version isn't on npm yet, then push the release tags.
          npx changeset publish
          git push origin --tags
